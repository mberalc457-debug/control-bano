<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Control Baño · IES San Antonio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f4f4f5;--surface:#fff;--ink:#18181b;--ink2:#71717a;
    --accent:#16a34a;--accent-light:#dcfce7;
    --warn:#f59e0b;--warn-light:#fef3c7;
    --danger:#dc2626;--danger-light:#fee2e2;
    --border:#e4e4e7;--radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100dvh;}

  /* ── LOGIN ── */
  .login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:32px 20px;gap:20px;}
  .login-icon{font-size:3.5rem;}
  .login-title{font-size:1.4rem;font-weight:700;text-align:center;}
  .login-sub{font-size:.9rem;color:var(--ink2);text-align:center;}
  .login-box{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:24px 20px;width:100%;max-width:340px;display:flex;flex-direction:column;gap:14px;}
  .login-box label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--ink2);}
  .pass-wrap{position:relative;}
  .pass-wrap input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:13px 44px 13px 14px;font-family:'DM Sans',sans-serif;font-size:1rem;color:var(--ink);outline:none;}
  .pass-wrap input:focus{border-color:var(--accent);}
  .pass-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--ink2);}
  .btn-login{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:14px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;}
  .login-err{background:var(--danger-light);color:var(--danger);border-radius:8px;padding:10px 14px;font-size:.85rem;font-weight:600;text-align:center;display:none;}
  .login-err.vis{display:block;}

  /* ── APP ── */
  .app-screen{display:none;}
  .app-screen.vis{display:block;}

  /* ── HEADER ── */
  .header{background:var(--accent);color:#fff;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.15);}
  .header-title{font-size:1rem;font-weight:700;}
  .header-right{text-align:right;}
  .header-time{font-size:.75rem;opacity:.9;line-height:1.4;}
  .reloj{font-size:.85rem;font-weight:700;}
  .sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#fff;margin-right:3px;opacity:.5;}
  .sync-dot.syncing{opacity:1;background:#fde047;animation:blink .6s infinite;}
  .sync-dot.ok{opacity:1;background:#86efac;}
  .sync-dot.err{opacity:1;background:#fca5a5;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  .sync-label{font-size:.65rem;opacity:.85;}
  .btn-logout{background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:6px;padding:4px 9px;font-size:.72rem;font-weight:700;cursor:pointer;margin-top:3px;}

  /* ── CURSO ── */
  .curso-bar{padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);}
  .curso-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--ink2);margin-bottom:5px;}
  .select-wrap{position:relative;}
  .select-wrap::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--ink2);pointer-events:none;font-size:.9rem;}
  .field{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:11px 32px 11px 12px;font-family:'DM Sans',sans-serif;font-size:.95rem;color:var(--ink);width:100%;appearance:none;-webkit-appearance:none;outline:none;}
  .field:focus{border-color:var(--accent);}

  /* ── HORA ROWS ── */
  .horas-list{padding:10px 14px;display:flex;flex-direction:column;gap:8px;}

  .hora-row{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .hora-row.recreo{background:var(--warn-light);border-color:var(--warn);}

  .hora-header{display:flex;align-items:center;gap:8px;padding:10px 12px;}
  .hora-label-wrap{display:flex;flex-direction:column;min-width:52px;}
  .hora-num{font-size:.95rem;font-weight:700;color:var(--accent);}
  .hora-row.recreo .hora-num{color:#92400e;}
  .hora-rango{font-size:.75rem;color:var(--ink2);}

  .hora-students{flex:1;display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
  .student-pill{display:inline-flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:99px;padding:4px 11px;font-size:.85rem;font-weight:600;cursor:pointer;transition:background .15s;}
  .student-pill:hover{background:var(--accent-light);}
  .student-pill.out{background:var(--warn-light);border-color:var(--warn);}
  .student-pill.back{background:var(--accent-light);border-color:#86efac;}
  .pill-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
  .pill-dot.warn{background:var(--warn);animation:pulse 1.2s infinite;}
  .pill-dot.ok{background:var(--accent);}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

  .btn-add-hora{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:6px 10px;font-size:.8rem;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
  .btn-add-hora:active{transform:scale(.95);}

  /* ── INLINE FORM ── */
  .inline-form{padding:10px 12px;background:#f8fdf9;border-top:1px solid var(--accent-light);display:none;}
  .inline-form.open{display:block;}
  .inline-form-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--accent);margin-bottom:6px;}
  .inline-input-row{display:flex;gap:8px;align-items:center;position:relative;}
  .inline-input{flex:1;border:1.5px solid var(--border);border-radius:9px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--ink);outline:none;background:var(--surface);}
  .inline-input:focus{border-color:var(--accent);}
  .btn-inline-ok{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 14px;font-size:.85rem;font-weight:700;cursor:pointer;}
  .btn-inline-cancel{background:var(--bg);color:var(--ink2);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:.85rem;font-weight:700;cursor:pointer;}

  /* autocomplete */
  .autocomplete-list{position:absolute;top:100%;left:0;right:60px;background:var(--surface);border:1.5px solid var(--border);border-radius:9px;margin-top:4px;z-index:20;box-shadow:0 4px 16px rgba(0,0,0,.1);overflow:hidden;display:none;}
  .autocomplete-list.open{display:block;}
  .ac-item{padding:10px 12px;font-size:.9rem;cursor:pointer;border-bottom:1px solid var(--border);}
  .ac-item:last-child{border-bottom:none;}
  .ac-item:hover,.ac-item:active{background:var(--accent-light);}

  /* ── STUDENT DETAIL ── */
  .student-detail{padding:10px 12px;border-top:1px solid var(--border);background:#fafafa;display:none;}
  .student-detail.open{display:block;}
  .sd-name{font-weight:700;font-size:.95rem;margin-bottom:6px;}
  .sd-times{display:flex;gap:10px;font-size:.78rem;color:var(--ink2);flex-wrap:wrap;margin-bottom:8px;}
  .sd-times strong{color:var(--ink);}
  .sd-dur{font-size:.8rem;font-weight:700;margin-bottom:8px;}
  .sd-dur.larga{color:var(--danger);}
  .sd-actions{display:flex;gap:7px;}
  .btn-sd{flex:1;border:none;border-radius:8px;padding:10px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;}
  .btn-sd:active{transform:scale(.96);}
  .btn-vuelto{background:var(--accent);color:#fff;}
  .btn-del{background:var(--danger-light);color:var(--danger);flex:0 0 auto;}
  .btn-close-sd{background:var(--bg);color:var(--ink2);border:1.5px solid var(--border);flex:0 0 auto;}

  /* ── STATS ── */
  .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px 14px 0;}
  .stat-box{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:8px 4px;text-align:center;}
  .stat-val{font-size:1.3rem;font-weight:700;color:var(--accent);line-height:1;}
  .stat-lbl{font-size:.58rem;color:var(--ink2);font-weight:600;margin-top:2px;text-transform:uppercase;letter-spacing:.3px;}

  /* ── BOTTOM BAR ── */
  .bottom-bar{position:sticky;bottom:0;z-index:40;background:var(--surface);border-top:1px solid var(--border);padding:10px 14px calc(10px + env(safe-area-inset-bottom));display:flex;gap:8px;}
  .btn-bar{flex:1;border:none;border-radius:10px;padding:12px 8px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;}
  .btn-bar:active{transform:scale(.97);}
  .btn-bar-outline{background:var(--bg);color:var(--ink);border:1.5px solid var(--border);}
  .btn-bar-green{background:var(--accent);color:#fff;}

  /* ── MODAL ── */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 16px calc(20px + env(safe-area-inset-bottom));width:100%;max-height:75dvh;display:flex;flex-direction:column;gap:12px;}
  .modal-handle{width:40px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 4px;}
  .modal h3{font-size:1rem;font-weight:700;}
  .modal pre{background:#18181b;color:#e4e4e7;border-radius:10px;padding:14px;font-size:.72rem;overflow:auto;flex:1;white-space:pre-wrap;line-height:1.6;}
  .modal-btns{display:flex;gap:8px;}
  .modal-btns button{flex:1;border:none;border-radius:10px;padding:12px;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;}
  .btn-copy{background:var(--accent);color:#fff;}
  .btn-close-m{background:var(--bg);color:var(--ink);}

  /* ── TOAST ── */
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#18181b;color:#fff;border-radius:10px;padding:9px 16px;font-size:.82rem;font-weight:600;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;}
  .spacer{height:80px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-icon">🚻</div>
  <div class="login-title">Control de Baño<br>IES San Antonio</div>
  <div class="login-sub">Introduce la contraseña del centro</div>
  <div class="login-box">
    <label>Contraseña</label>
    <div class="pass-wrap">
      <input type="password" id="inp-pass" placeholder="Contraseña" onkeydown="if(event.key==='Enter')intentarLogin()">
      <button class="pass-toggle" onclick="togglePass()">👁</button>
    </div>
    <div class="login-err" id="login-err">Contraseña incorrecta.</div>
    <button class="btn-login" onclick="intentarLogin()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div class="app-screen" id="app-screen">

  <div class="header">
    <div class="header-title">🚻 Control de Baño</div>
    <div class="header-right">
      <div class="header-time">
        <div id="fecha-hoy"></div>
        <div class="reloj" id="reloj-live"></div>
      </div>
      <div style="margin-top:3px;display:flex;align-items:center;justify-content:flex-end;gap:7px;">
        <span><span class="sync-dot" id="sync-dot"></span><span class="sync-label" id="sync-label">Listo</span></span>
        <button class="btn-logout" onclick="cerrarSesion()">Salir</button>
      </div>
    </div>
  </div>

  <div class="curso-bar">
    <div class="curso-label">Curso</div>
    <div class="select-wrap">
      <select class="field" id="sel-curso" onchange="renderHoras()">
        <option value="">— Selecciona curso —</option>
        <optgroup label="1.º ESO"><option>1.º ESO A</option><option>1.º ESO B</option><option>1.º ESO C</option><option>1.º ESO D</option></optgroup>
        <optgroup label="2.º ESO"><option>2.º ESO A</option><option>2.º ESO B</option><option>2.º ESO C</option><option>2.º ESO D</option></optgroup>
        <optgroup label="3.º ESO"><option>3.º ESO A</option><option>3.º ESO B</option><option>3.º ESO C</option><option>3.º ESO D</option></optgroup>
        <optgroup label="4.º ESO"><option>4.º ESO A</option><option>4.º ESO B</option><option>4.º ESO C</option><option>4.º ESO D</option></optgroup>
      </select>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat-box"><div class="stat-val" id="st-total">0</div><div class="stat-lbl">Total</div></div>
    <div class="stat-box"><div class="stat-val" id="st-fuera" style="color:var(--warn)">0</div><div class="stat-lbl">Fuera</div></div>
    <div class="stat-box"><div class="stat-val" id="st-media">—</div><div class="stat-lbl">Media</div></div>
    <div class="stat-box"><div class="stat-val" id="st-max">—</div><div class="stat-lbl">Máx</div></div>
  </div>

  <!-- HORAS -->
  <div class="horas-list" id="horas-list"></div>

  <div class="spacer"></div>

  <div class="bottom-bar">
    <button class="btn-bar btn-bar-outline" onclick="abrirResumen()">📋 Resumen</button>
    <button class="btn-bar btn-bar-outline" onclick="forzarSync()">🔄 Actualizar</button>
    <button class="btn-bar btn-bar-green" onclick="exportarExcel()">📥 Excel</button>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>📋 Resumen del día</h3>
    <pre id="modal-content"></pre>
    <div class="modal-btns">
      <button class="btn-close-m" onclick="cerrarModal()">Cerrar</button>
      <button class="btn-copy" onclick="copiarResumen()">📄 Copiar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modal-alerta">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="font-size:2rem;text-align:center">⚠️</div>
    <p id="alerta-msg" style="text-align:center;font-size:.95rem;font-weight:600;line-height:1.5;padding:0 8px"></p>
    <div class="modal-btns">
      <button class="btn-copy" onclick="document.getElementById('modal-alerta').classList.remove('open')">Entendido</button>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
const PASSWORD = '0000';
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxbfQ-EHckkXqwSfTKqTrPAHse9bOCRIYlhgE19RPtq4byO8INvCLIPZYEY3iBGzjMJ/exec';

const HORAS = [
  {label:'1ª',rango:'08:30-09:30'},
  {label:'2ª',rango:'09:30-10:30'},
  {label:'3ª',rango:'10:30-11:30'},
  {label:'🧃',rango:'Recreo',recreo:true},
  {label:'4ª',rango:'12:00-13:00'},
  {label:'5ª',rango:'13:00-14:00'},
  {label:'6ª',rango:'14:00-15:00'},
];

// registros[horaIdx][curso] = [{alumno, salida, regreso}]
let registros = {};
HORAS.forEach((_,i) => registros[i] = {});

// activeForm: {horaIdx} — which hour has the inline form open
let activeForm = null;
// activeDetail: {horaIdx, alumnoIdx} — which student detail is open
let activeDetail = null;
let timerRender = null;

// ── LOGIN ────────────────────────────────────────────
function togglePass() {
  const i = document.getElementById('inp-pass');
  i.type = i.type === 'password' ? 'text' : 'password';
}
function intentarLogin() {
  const pass = document.getElementById('inp-pass').value.trim();
  if (pass === PASSWORD) {
    document.getElementById('login-err').classList.remove('vis');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').classList.add('vis');
    iniciarApp();
  } else {
    document.getElementById('login-err').classList.add('vis');
  }
}
function cerrarSesion() {
  document.getElementById('app-screen').classList.remove('vis');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('inp-pass').value = '';
  activeForm = null; activeDetail = null;
}

// ── INIT ─────────────────────────────────────────────
async function iniciarApp() {
  document.getElementById('fecha-hoy').textContent =
    new Date().toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'});
  tick();
  await cargarDatos();
  setInterval(() => cargarDatos(true), 20000);
}



// ── CLOCK ────────────────────────────────────────────
function tick() {
  document.getElementById('reloj-live').textContent =
    new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  // refresh durations every minute
  clearTimeout(timerRender);
  timerRender = setTimeout(() => { renderHoras(); tick(); }, 60000);
}
setInterval(tick, 1000);

// ── SYNC ─────────────────────────────────────────────
function setSyncState(state, txt) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if (!dot) return;
  dot.className = 'sync-dot ' + state;
  lbl.textContent = txt;
}

async function cargarDatos(silencioso = false) {
  if (!silencioso) setSyncState('syncing', 'Cargando…');
  try {
    const res = await fetch(`${SCRIPT_URL}?pass=${encodeURIComponent(PASSWORD)}&t=${Date.now()}`);
    const data = await res.json();
    if (data.error) { setSyncState('err', 'Sin acceso'); return; }
    registros = deserializar(data.rows);
    setSyncState('ok', 'Sincronizado ✓');
    renderHoras(); renderStats();
  } catch(e) {
    setSyncState('err', 'Sin conexión');
    if (!silencioso) mostrarToast('⚠️ No se pudo cargar.');
  }
}

async function guardarDatos() {
  setSyncState('syncing', 'Guardando…');
  try {
    const rows = serializar();
    const data = encodeURIComponent(JSON.stringify(rows));
    const url = `${SCRIPT_URL}?pass=${encodeURIComponent(PASSWORD)}&action=write&data=${data}`;
    const res = await fetch(url);
    const json = await res.json();
    if (json.ok) setSyncState('ok', 'Guardado ✓');
    else { setSyncState('err', 'Error'); mostrarToast('⚠️ No se pudo guardar.'); }
  } catch(e) {
    setSyncState('err', 'Error al guardar');
    mostrarToast('⚠️ No se pudo guardar.');
  }
}

function forzarSync() { mostrarToast('🔄 Actualizando…'); cargarDatos(false); }

// ── SERIALIZAR ───────────────────────────────────────
function serializar() {
  const fecha = new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'});
  const rows = [['Fecha','horaIdx','Hora','Franja','Curso','Alumno/a','Salida','Regreso','Duración (min)','Estado']];
  HORAS.forEach((h,i) => {
    if (h.recreo) return;
    Object.keys(registros[i]).forEach(c => {
      (registros[i][c]||[]).forEach(r => {
        const fin = r.regreso || new Date();
        const dur = Math.floor((fin - r.salida) / 60000);
        rows.push([
          fecha, i, h.label, h.rango, c, r.alumno,
          fmtHora(r.salida),
          r.regreso ? fmtHora(r.regreso) : 'Fuera',
          dur,
          r.regreso ? 'Vuelto' : 'Fuera'
        ]);
      });
    });
  });
  return rows;
}

function deserializar(rows) {
  const n = {};
  HORAS.forEach((_,i) => n[i] = {});
  if (!rows || rows.length <= 1) return n;
  const hoy = new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'});
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i].map(String);
    const fecha = r[0], hi = r[1], curso = r[4], alumno = r[5], salidaStr = r[6], regresoStr = r[7];
    if (!fecha || !hi || !curso || !alumno) continue;
    if (fecha !== hoy) continue;
    const idx = parseInt(hi);
    if (isNaN(idx) || idx < 0 || idx >= HORAS.length) continue;
    if (!n[idx][curso]) n[idx][curso] = [];
    const [d,m,y] = fecha.split('/');
    const salida = parseFechaHora(`${y}-${m}-${d}`, salidaStr);
    const regreso = regresoStr && regresoStr !== 'Fuera' ? parseFechaHora(`${y}-${m}-${d}`, regresoStr) : null;
    if (salida) n[idx][curso].push({alumno, salida, regreso});
  }
  return n;
}

function parseFechaHora(fechaISO, horaStr) {
  if (!horaStr || horaStr === 'Fuera') return null;
  const [h,m,s] = horaStr.split(':').map(Number);
  const d = new Date(fechaISO);
  d.setHours(h||0, m||0, s||0, 0);
  return d;
}

// ── RENDER HORAS ─────────────────────────────────────
function renderHoras() {
  const curso = document.getElementById('sel-curso').value;
  const list = document.getElementById('horas-list');
  list.innerHTML = '';

  HORAS.forEach((h, i) => {
    const row = document.createElement('div');
    row.className = 'hora-row' + (h.recreo ? ' recreo' : '');
    row.id = `hora-row-${i}`;

    // Header
    const header = document.createElement('div');
    header.className = 'hora-header';

    const labelWrap = document.createElement('div');
    labelWrap.className = 'hora-label-wrap';
    labelWrap.innerHTML = `<span class="hora-num">${h.label}</span><span class="hora-rango">${h.rango}</span>`;

    const studentsWrap = document.createElement('div');
    studentsWrap.className = 'hora-students';

    if (curso && !h.recreo) {
      const lista = registros[i][curso] || [];
      lista.forEach((r, idx) => {
        const pill = document.createElement('span');
        const activo = !r.regreso;
        pill.className = `student-pill ${activo ? 'out' : 'back'}`;
        pill.innerHTML = `<span class="pill-dot ${activo?'warn':'ok'}"></span>${esc(r.alumno)}`;
        pill.onclick = () => toggleDetail(i, idx);
        studentsWrap.appendChild(pill);
      });
    }

    header.appendChild(labelWrap);
    header.appendChild(studentsWrap);

    if (!h.recreo) {
      const btnAdd = document.createElement('button');
      btnAdd.className = 'btn-add-hora';
      btnAdd.textContent = '➕';
      btnAdd.onclick = () => toggleForm(i);
      header.appendChild(btnAdd);
    }

    row.appendChild(header);

    // Inline form
    if (!h.recreo) {
      const form = document.createElement('div');
      form.className = 'inline-form' + (activeForm === i ? ' open' : '');
      form.id = `form-${i}`;
      form.innerHTML = `
        <div class="inline-form-label">Nombre del alumno/a</div>
        <div class="inline-input-row">
          <input class="inline-input" id="inp-${i}" type="text" placeholder="Escribe el nombre…" autocomplete="off" autocorrect="off" spellcheck="false">
          <button class="btn-inline-ok" onclick="registrarSalida(${i})">✅</button>
          <button class="btn-inline-cancel" onclick="cerrarForm()">✖</button>
          <div class="autocomplete-list" id="ac-${i}"></div>
        </div>`;
      row.appendChild(form);

      // Bind input events after appending
      setTimeout(() => {
        const inp = document.getElementById(`inp-${i}`);
        if (!inp) return;
        inp.addEventListener('input', () => mostrarAutocomplete(i));
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') registrarSalida(i); if (e.key === 'Escape') cerrarForm(); });
        if (activeForm === i) { inp.focus(); mostrarAutocomplete(i); }
      }, 0);
    }

    // Student details
    if (curso && !h.recreo) {
      const lista = registros[i][curso] || [];
      lista.forEach((r, idx) => {
        const detail = document.createElement('div');
        const isActive = activeDetail && activeDetail.horaIdx === i && activeDetail.alumnoIdx === idx;
        detail.className = 'student-detail' + (isActive ? ' open' : '');
        detail.id = `detail-${i}-${idx}`;
        detail.innerHTML = buildDetailHTML(r, i, idx);
        row.appendChild(detail);
      });
    }

    list.appendChild(row);
  });

  renderStats();
}

function buildDetailHTML(r, horaIdx, idx) {
  const now = new Date();
  const fin = r.regreso || now;
  const dur = Math.floor((fin - r.salida) / 60000);
  const activo = !r.regreso;
  return `
    <div class="sd-name">${esc(r.alumno)}</div>
    <div class="sd-times">
      <span>🚶 Salida: <strong>${fmtHora(r.salida)}</strong></span>
      ${r.regreso ? `<span>🏫 Regreso: <strong>${fmtHora(r.regreso)}</strong></span>` : ''}
    </div>
    <div class="sd-dur${dur >= 10 ? ' larga' : ''}">⏱ ${dur} min${activo ? ' (en curso)' : ''}</div>
    <div class="sd-actions">
      ${activo ? `<button class="btn-sd btn-vuelto" onclick="registrarRegreso(${horaIdx},${idx})">✅ Ha vuelto</button>` : '<div style="flex:1"></div>'}
      <button class="btn-sd btn-del" onclick="borrarAlumno(${horaIdx},${idx})">🗑</button>
      <button class="btn-sd btn-close-sd" onclick="cerrarDetail()">✖</button>
    </div>`;
}

// ── AUTOCOMPLETE ─────────────────────────────────────
function mostrarAutocomplete(horaIdx) {
  const curso = document.getElementById('sel-curso').value;
  const inp = document.getElementById(`inp-${horaIdx}`);
  const ac = document.getElementById(`ac-${horaIdx}`);
  if (!inp || !ac || !curso) return;

  const query = inp.value.trim().toLowerCase();
  // gather all names used in this course today
  const nombres = new Set();
  HORAS.forEach((_,i) => {
    (registros[i][curso] || []).forEach(r => nombres.add(r.alumno));
  });

  const matches = [...nombres].filter(n => n.toLowerCase().includes(query) && query.length > 0);

  if (matches.length === 0) { ac.classList.remove('open'); ac.innerHTML = ''; return; }

  ac.innerHTML = matches.map(n => `<div class="ac-item" onclick="seleccionarNombre(${horaIdx},'${esc(n)}')">${esc(n)}</div>`).join('');
  ac.classList.add('open');
}

function seleccionarNombre(horaIdx, nombre) {
  const inp = document.getElementById(`inp-${horaIdx}`);
  const ac = document.getElementById(`ac-${horaIdx}`);
  if (inp) inp.value = nombre;
  if (ac) { ac.classList.remove('open'); ac.innerHTML = ''; }
}

// ── FORM ─────────────────────────────────────────────
function toggleForm(horaIdx) {
  const curso = document.getElementById('sel-curso').value;
  if (!curso) { mostrarToast('⚠️ Selecciona un curso primero.'); return; }
  activeForm = activeForm === horaIdx ? null : horaIdx;
  activeDetail = null;
  renderHoras();
}

function cerrarForm() {
  activeForm = null;
  renderHoras();
}

// ── DETAIL ───────────────────────────────────────────
function toggleDetail(horaIdx, alumnoIdx) {
  if (activeDetail && activeDetail.horaIdx === horaIdx && activeDetail.alumnoIdx === alumnoIdx) {
    activeDetail = null;
  } else {
    activeDetail = {horaIdx, alumnoIdx};
    activeForm = null;
  }
  renderHoras();
}

function cerrarDetail() {
  activeDetail = null;
  renderHoras();
}

// ── REGISTRAR ────────────────────────────────────────
function registrarSalida(horaIdx) {
  const curso = document.getElementById('sel-curso').value;
  const inp = document.getElementById(`inp-${horaIdx}`);
  const nombre = inp ? inp.value.trim() : '';
  if (!nombre) { mostrarToast('⚠️ Escribe el nombre del alumno/a.'); return; }
  if (!registros[horaIdx][curso]) registros[horaIdx][curso] = [];
  registros[horaIdx][curso].push({alumno: nombre, salida: new Date(), regreso: null});
  activeForm = null;
  activeDetail = {horaIdx, alumnoIdx: registros[horaIdx][curso].length - 1};
  renderHoras(); guardarDatos();
  mostrarToast('✅ Salida registrada');

  // Contar cuántas veces ha salido hoy este alumno en este curso
  const hoy = new Date().toDateString();
  let vecesHoy = 0;
  HORAS.forEach((_,i) => {
    (registros[i][curso] || []).forEach(r => {
      if (r.alumno.trim().toLowerCase() === nombre.trim().toLowerCase() &&
          new Date(r.salida).toDateString() === hoy) vecesHoy++;
    });
  });
  if (vecesHoy >= 3) {
    setTimeout(() => mostrarAlerta(`⚠️ El/La alumno/a "${nombre}" ha salido un número elevado de veces hoy (${vecesHoy} veces).`), 100);
  }
}

function registrarRegreso(horaIdx, alumnoIdx) {
  const curso = document.getElementById('sel-curso').value;
  registros[horaIdx][curso][alumnoIdx].regreso = new Date();
  renderHoras(); guardarDatos();
  mostrarToast('✅ Regreso registrado');
}

function borrarAlumno(horaIdx, alumnoIdx) {
  const curso = document.getElementById('sel-curso').value;
  if (confirm('¿Eliminar este registro?')) {
    registros[horaIdx][curso].splice(alumnoIdx, 1);
    activeDetail = null;
    renderHoras(); guardarDatos();
  }
}

// ── STATS ────────────────────────────────────────────
function renderStats() {
  const curso = document.getElementById('sel-curso').value;
  let total = 0, fuera = 0; const durs = [];
  const now = new Date();
  HORAS.forEach((_,i) => {
    (registros[i][curso] || []).forEach(r => {
      total++;
      if (!r.regreso) fuera++;
      else durs.push(Math.floor((r.regreso - r.salida) / 60000));
    });
  });
  document.getElementById('st-total').textContent = total;
  document.getElementById('st-fuera').textContent = fuera;
  if (durs.length) {
    document.getElementById('st-media').textContent = Math.round(durs.reduce((a,b)=>a+b,0)/durs.length);
    document.getElementById('st-max').textContent = Math.max(...durs);
  } else {
    document.getElementById('st-media').textContent = '—';
    document.getElementById('st-max').textContent = '—';
  }
}

// ── RESUMEN ──────────────────────────────────────────
function abrirResumen() {
  const fecha = new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const lineas = [`CONTROL DE BAÑO · ${fecha.toUpperCase()}`, '─'.repeat(42)];
  let hay = false;
  HORAS.forEach((h,i) => {
    const cursos = Object.keys(registros[i]).filter(c => registros[i][c].length > 0);
    if (!cursos.length) return; hay = true;
    lineas.push(`\n▸ ${h.label} (${h.rango})`);
    cursos.forEach(c => {
      lineas.push(`  📚 ${c}`);
      registros[i][c].forEach((r,idx) => {
        const dur = r.regreso ? Math.floor((r.regreso-r.salida)/60000)+'min' : 'fuera';
        lineas.push(`  ${idx+1}. ${r.alumno}  |  ${fmtHora(r.salida)} → ${r.regreso?fmtHora(r.regreso):'?'}  (${dur})`);
      });
    });
  });
  if (!hay) lineas.push('\n(Sin registros)');
  document.getElementById('modal-content').textContent = lineas.join('\n');
  document.getElementById('modal').classList.add('open');
}
function cerrarModal() { document.getElementById('modal').classList.remove('open'); }
function copiarResumen() {
  navigator.clipboard.writeText(document.getElementById('modal-content').textContent)
    .then(() => mostrarToast('📄 Copiado'))
    .catch(() => mostrarToast('No se pudo copiar'));
}
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) cerrarModal();
});

// ── EXCEL ────────────────────────────────────────────
function exportarExcel() {
  if (typeof XLSX === 'undefined') { mostrarToast('⚠️ Cargando librería…'); return; }
  const fecha = new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'});
  const wb = XLSX.utils.book_new();
  const rows = [['Fecha','Hora','Franja','Curso','Alumno/a','Salida','Regreso','Duración (min)','Estado']];
  HORAS.forEach((h,i) => {
    if (h.recreo) return;
    Object.keys(registros[i]).forEach(c => {
      (registros[i][c]||[]).forEach(r => {
        const fin = r.regreso || new Date();
        const dur = Math.floor((fin - r.salida) / 60000);
        rows.push([fecha, h.label, h.rango, c, r.alumno, fmtHora(r.salida), r.regreso ? fmtHora(r.regreso) : 'Fuera', dur, r.regreso ? 'Vuelto' : 'Fuera']);
      });
    });
  });
  if (rows.length === 1) { mostrarToast('⚠️ No hay datos para exportar.'); return; }
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:12},{wch:6},{wch:14},{wch:14},{wch:24},{wch:12},{wch:12},{wch:14},{wch:10}];
  XLSX.utils.book_append_sheet(wb, ws, 'Registros');
  XLSX.writeFile(wb, `Control_Bano_${fecha.replace(/\//g,'-')}.xlsx`);
  mostrarToast('📥 Excel descargado');
}

// ── UTILS ────────────────────────────────────────────
function mostrarAlerta(msg) {
  document.getElementById('alerta-msg').textContent = msg;
  document.getElementById('modal-alerta').classList.add('open');
}
function mostrarToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
function fmtHora(d) { return d instanceof Date && !isNaN(d) ? d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'}) : '—'; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;'); }
</script>
